# ---------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------

set-option -g prefix C-x         # Use C-x as the tmux prefix
bind C-x send-prefix             # Send literal C-x to nested sessions


# ---------------------------------------------------------------------
# Global options
# ---------------------------------------------------------------------

set -g default-terminal "tmux-256color"  # Correct TERM for apps inside tmux
# set -g default-terminal "xterm-256color" # Use this if problems above
set -as terminal-features ",xterm-256color:RGB"  # Enable RGB for WezTerm

set -g allow-passthrough on      # Allow passthrough escape sequences
set -g history-limit 100000      # Keep more scrollback history
set -g renumber-windows on       # Renumber windows after one is closed
set -g set-titles off            # Do not set the terminal title
set -g monitor-activity on       # Track activity in other windows
set -g visual-activity off       # Do not show visual activity alerts
set -g set-clipboard external    # Allow apps to set clipboard via OSC 52

# set -g set-titles-string '#h ❐ #S ● #I #W'  # Custom terminal title format


# ---------------------------------------------------------------------
# Window options
# ---------------------------------------------------------------------

setw -g mode-keys emacs          # Use Emacs bindings in copy mode
setw -g automatic-rename on      # Rename windows based on active program


# ---------------------------------------------------------------------
# Window management bindings
# ---------------------------------------------------------------------

# Create a new window, starting in "session-root" if defined
bind c if -F "#{==:#{@session-root},}" \
    "new-window" \
    "new-window -c '#{@session-root}'"

bind C-c if -F "#{==:#{@session-root},}" \
    "new-window" \
    "new-window -c '#{@session-root}'"

bind C-p previous-window         # Switch to the previous window
bind C-n next-window             # Switch to the next window

bind C-S-Left swap-window -t -1\; previous-window  # Move window left
bind C-S-Right swap-window -t +1\; next-window     # Move window right

# Rename the current window to the basename of the current path
bind N run-shell 'tmux rename-window "$(basename "#{pane_current_path}")"'

# ---------------------------------------------------------------------
# Pane management bindings
# ---------------------------------------------------------------------

bind - split-window -v           # Split pane vertically
bind _ split-window -h           # Split pane horizontally

bind Left select-pane -L         # Move to the tmux pane on the left
bind Right select-pane -R        # Move to the tmux pane on the right
bind Up select-pane -U           # Move to the tmux pane above
bind Down select-pane -D         # Move to the tmux pane below


# ---------------------------------------------------------------------
# Copy-mode bindings
# ---------------------------------------------------------------------

# Enter copy mode and start incremental reverse search.
bind-key C-r copy-mode \; command-prompt -i -T search \
  -p "search backward" "send-keys -X search-backward-incremental '%%%'"

# Incremental backward search in copy mode
bind-key -T copy-mode C-r command-prompt -i -T search \
  -p "search backward" "send-keys -X search-backward-incremental '%%%'"

# Incremental forward search in copy mode
bind-key -T copy-mode C-s command-prompt -i -T search \
  -p "search forward" "send-keys -X search-forward-incremental '%%%'"

# Copy selection to clipboard
bind-key -T copy-mode M-w send-keys -X copy-pipe-and-cancel "pbcopy"

# Exit copy mode
bind-key -T copy-mode C-g send-keys -X cancel
bind-key -T copy-mode Escape send-keys -X cancel
bind-key -T copy-mode Enter send-keys -X cancel


# ---------------------------------------------------------------------
# Disabled bindings
# ---------------------------------------------------------------------

unbind-key C-z                   # Avoid accidental suspend via C-x C-z


# ---------------------------------------------------------------------
# Status
# ---------------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-justify centre

set -g status-style "bg=#0f1c31,fg=#7f8db3"

set -g status-left-length 3
set -g status-left "#[bg=#0f1c31,fg=#7f8db3] #{?client_prefix,#[fg=#fae060]⌘#[fg=#7f8db3], } "
set -g status-left-style "bg=#0f1c31,fg=#7f8db3"

set -g status-right-length 32
set -g status-right "#[bg=#0f1c31,fg=#3b6470]#[bg=#3b6470,fg=#f9f5f9]  #S  #[bg=#0f1c31,fg=#3b6470] "
set -g status-right-length 32
set -g status-right "#[bg=#0f1c31,fg=#2f5260]#[bg=#2f5260,fg=#c7d7df]  #S  #[bg=#0f1c31,fg=#2f5260] "

set -g window-status-separator ""

set -g window-status-current-format "#[bg=#0f1c31,fg=#7f8db3]#[bg=#7f8db3,fg=#0f1c31,bold]  #W  #[bg=#0f1c31,fg=#7f8db3] "

set -g window-status-format "#[bg=#0f1c31,fg=#182942]#[bg=#182942,fg=#9aa7cf,dim]  #W #[fg=#b89b4f,nodim]#{?window_last_flag,↩, } #[bg=#0f1c31,fg=#182942] "

set -g window-status-activity-style "bg=#182942,fg=#fae060,nodim"
set -g window-status-bell-style "bg=#182942,fg=#ff6b6b,bold"

# ---------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------

# Install the plugin manager via brew
# brew install tmuxpack/tpack/tpack

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'

# And use <prefix>-I to install the plugins
